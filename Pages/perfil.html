<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardião Digital - Perfil</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="app-layout">
    <div class="sidebar">
        <div class="logo">🛡️ Guardião Digital</div>
        <a href="trilha.html" class="nav-item">Trilha de Aprendizado</a>
        <a href="conquistas.html" class="nav-item">Conquistas</a>
        <a href="perfil.html" class="nav-item">Perfil</a>
        <div class="sidebar-spacer"></div>
        <a href="#" class="nav-item" onclick="logout()" style="color: #ff4d4d;">Sair</a>
    </div>
    <div class="main-content">
        <div class="header-stats">⭐ XP: <span id="xp-counter">0</span></div>
        <h2 class="page-title">Meu Perfil de Guardião</h2>
        <div class="profile-complex-layout">
            <div class="profile-left-panel">
                <div class="avatar-circle-container"><img id="current-avatar-circular"></div>
                <h3 id="profile-data-name"></h3>
                <p id="profile-data-email" style="color: var(--text-light); font-size: 14px;"></p>
                <div class="info-data-list">
                    <div class="info-data-item">
                        <p class="info-data-label">Está Estudando Atualmente</p>
                        <p id="profile-data-study"
                            style="color: var(--primary-blue); font-weight: bold; font-size: 16px;"></p>
                    </div>
                </div>
            </div>
            <div class="profile-right-panel">
                <div class="profile-card-section">
                    <h4>Visão Geral do Avanço</h4>
                    <div class="progress-container">
                        <div class="progress-bar" id="overall-progress-bar"></div>
                    </div>
                    <p id="progress-percentage-text" style="color: var(--text-light); font-size: 14px;"></p>
                </div>
                <div class="profile-card-section">
                    <h4>Medalhas e Conquistas</h4>
                    <div id="profile-medals-list" style="text-align: center;"></div>
                </div>
                <div class="profile-card-section">
                    <h4>Mudar Personagem</h4>
                    <div class="avatar-options-grid" id="avatar-picker-grid"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/global.js"></script>
    <script src="../js/perfil.js"></script>
</body>

</html>
